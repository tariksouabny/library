<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="styles.css" />
    <title>Library</title>
  </head>
  <body>
    <div class="left main">
      <div class="title-description">
        <h1 class="title">Personal Library</h1>
        <h3 class="description">Made by Tarik Souabny</h3>
        <div class="click-for-info">
          <!---Info Icon-->
          <link
            rel="stylesheet"
            href="https://fonts.sandbox.google.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
          />
          <span class="material-symbols-outlined">
            info
          </span>
        </div>
      </div>
      <div id="new-book-submission">
        <div class="top-div">
          <h3>Add a book</h3>
        </div>
        <div class="bottom-div">
          <div class="left-div">
            <div class="name-input-label">
              <label for="name-input">Name</label
              ><input type="text" name="name" id="name-input" />
            </div>
            <div class="author-input-label">
              <label for="author-input">Author</label
              ><input type="text" name="author" id="author-input" />
            </div>
            <div class="pages-input-label">
              <label for="pages-input"># of Pages</label
              ><input type="number" name="pages" id="page-input" />
            </div>
          </div>

          <div class="right-div">
            <div class="read-input-label">
              <label for="read-check">Read?</label>
              <input type="checkbox" id="read-check" />
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="right main"></div>
  </body>
</html>
